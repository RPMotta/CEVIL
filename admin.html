<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Administração – Associação CEVIL</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Merriweather:wght@300;400;700&family=Open+Sans:wght@300;400;600;700&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: 'Open Sans', sans-serif; background: #1a3a5c; }
    #root { min-height: 100vh; }

    #loading {
      position: fixed; inset: 0;
      background: #1a3a5c;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      gap: 16px; z-index: 9999;
      transition: opacity .4s;
    }
    #loading .icone { font-size: 40px; }
    #loading .titulo {
      font-family: 'Merriweather', serif;
      font-size: 26px; font-weight: 700; color: #fff;
    }
    #loading .subtitulo {
      font-size: 11px; color: #c8992a;
      text-transform: uppercase; letter-spacing: 2px;
    }
    #loading .spinner {
      width: 36px; height: 36px; margin-top: 10px;
      border: 3px solid rgba(255,255,255,.15);
      border-top-color: #c8992a;
      border-radius: 50%;
      animation: spin .75s linear infinite;
    }
    #loading .msg {
      font-size: 12px; color: rgba(255,255,255,.45);
      margin-top: 4px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>

  <div id="loading">
    <div class="icone">🌿</div>
    <div class="titulo">CEVIL</div>
    <div class="subtitulo">Área Administrativa</div>
    <div class="spinner"></div>
    <div class="msg">Carregando sistema...</div>
  </div>

  <div id="root"></div>

  <!-- React 18 via CDN -->
  <script crossorigin src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
  <script crossorigin src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>

  <!-- Babel Standalone para transpilar JSX no browser -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>

  <!-- Sistema admin em JSX -->
  <script type="text/babel" data-presets="react" src="admin.jsx"
    onload="document.getElementById('loading').style.opacity='0';setTimeout(()=>document.getElementById('loading').style.display='none',400);"
    onerror="document.getElementById('loading').querySelector('.msg').textContent='Erro ao carregar. Verifique o console.';">
  </script>

</body>
</html>
